    default: true
    workspace:
      host: https://dbc-46217bae-ef1b.cloud.databricks.com
    variables:
      catalog: zach_hackathon_2026
      schema: default
  prod:
    mode: production
    workspace:
      host: https://dbc-46217bae-ef1b.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/zachary.jacobson@cdk.com to make sure we only have a single copy.
      root_path: /Workspace/Users/zachary.jacobson@cdk.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: zach_hackathon_2026
      schema: rag_test
    permissions:
      - user_name: zachary.jacobson@cdk.com
